<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Comparison</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at center, #050010, #000);
    color:white;
}

/* BACKGROUND GRID */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(rgba(255,0,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
    background-size:50px 50px;
}

body::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,0,255,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,255,200,0.25), transparent 40%);
}

/* HEADER */
.header{
    position:absolute;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 60px;
    border:2px solid #00ffc8;
    color:#00ffc8;
    text-shadow:0 0 15px #00ffc8;
    box-shadow:0 0 25px #00ffc8;
    letter-spacing:4px;
    z-index:2;
}

/* subtitle */
.subtitle{
    position:absolute;
    top:105px;
    left:50%;
    transform:translateX(-50%);
    color:#bbb;
    font-size:14px;
    letter-spacing:2px;
    text-align:center;
    z-index:2;
}

/* MAIN WRAPPER */
.wrapper{
    position:absolute;
    top:58%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:60px;
    z-index:2;
}

/* TOP ROW */
.top-row{
    display:flex;
    gap:120px;
}

/* BOTTOM ROW */
.bottom-row{
    display:flex;
    justify-content:center;
}

/* BOX BASE */
.box{
    width:320px;
    height:180px;
    padding:30px;
    position:relative;
    background:rgba(255,255,255,0.04);
    clip-path: polygon(10% 0%,100% 0%,100% 80%,90% 100%,0% 100%,0% 20%);
    transition: transform 0.15s ease;
    cursor: pointer;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* DEFAULT = PINK BORDER (MINIMAL) */
.box::before{
    content:"";
    position:absolute;
    inset:0;
    border:2px solid #ff00ff;
    clip-path:inherit;
    box-shadow:0 0 20px #ff00ff;
    transition:0.2s;
}

.box::after{
    content:"";
    position:absolute;
    inset:8px;
    border:1px solid #ff00ff;
    clip-path:inherit;
    opacity:0.6;
}

/* COMPLEX = GREEN */
.complex::before{
    border:2px solid #00ffc8;
    box-shadow:0 0 20px #00ffc8;
}
.complex::after{
    border:1px solid #00ffc8;
}

/* COMPARISON = BLUE */
.comparison::before{
    border:2px solid #00aaff;
    box-shadow:0 0 20px #00aaff;
}
.comparison::after{
    border:1px solid #00aaff;
}

/* HOVER EFFECT */
.box.hovered{
    transform: scale(1.12);
}

.box.hovered::before{
    box-shadow:
        0 0 40px currentColor,
        0 0 80px currentColor,
        0 0 150px currentColor;
}

/* TEXT */
.box h2{
    margin-bottom:10px;
    color:#ff99ff;
    text-shadow:0 0 10px #ff00ff;
}

/* COMPLEX TEXT */
.complex h2{
    color:#00ffc8;
    text-shadow:0 0 15px #00ffc8, 0 0 30px #00ffc8;
}

/* COMPARISON TEXT */
.comparison h2{
    color:#00aaff;
    text-shadow:0 0 15px #00aaff, 0 0 30px #00aaff;
}

/* GLITCH EFFECT */
.glitch{
    position:relative;
}

.glitch::before,
.glitch::after{
    content:attr(data-text);
    position:absolute;
    left:0;
    width:100%;
    overflow:hidden;
}

.glitch::before{
    color:#00ffff;
    z-index:-1;
    animation: glitch 2s infinite alternate;
}

.glitch::after{
    color:#ff00ff;
    z-index:-2;
    animation: glitch 3s infinite alternate;
}

@keyframes glitch{
    0%{clip-path:inset(0 0 90% 0);}
    50%{clip-path:inset(40% 0 20% 0);}
    100%{clip-path:inset(80% 0 0 0);}
}

.box p{
    font-size:13px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="header">HOME</div>

<div class="subtitle">
    A Comparative Study of Minimalist and Complex UI Design
</div>

<div class="wrapper">

    <div class="top-row">
        <!-- MINIMAL -->
        <div class="box" onclick="window.location.href='minimalist.html'">
            <h2 class="glitch" data-text="MINIMALIST UI">MINIMALIST UI</h2>
            <p>Clean & simple layout</p>
        </div>

        <!-- COMPLEX -->
        <div class="box complex" onclick="window.location.href='complex.html'">
            <h2 class="glitch" data-text="COMPLEX UI">COMPLEX UI</h2>
            <p>Rich & interactive design</p>
        </div>
    </div>

    <div class="bottom-row">
        <!-- COMPARISON -->
        <div class="box comparison" onclick="window.location.href='comparison.html'">
            <h2 class="glitch" data-text="COMPARISON">COMPARISON</h2>
            <p>Direct side-by-side analysis</p>
        </div>
    </div>

</div>

<script>
const boxes = document.querySelectorAll(".box");

/* MAGNETIC EFFECT */
document.addEventListener("mousemove", e => {
    boxes.forEach(box => {
        const rect = box.getBoundingClientRect();
        const dx = e.clientX - (rect.left + rect.width/2);
        const dy = e.clientY - (rect.top + rect.height/2);
        const distance = Math.sqrt(dx*dx + dy*dy);

        if(distance < 200){
            box.classList.add("hovered");
            box.style.transform =
                `translate(${dx * 0.08}px, ${dy * 0.08}px) scale(1.12)`;
        } else {
            box.classList.remove("hovered");
            box.style.transform = "translate(0,0) scale(1)";
        }
    });
});
</script>

</body>
</html>
